<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Atacadão - Premium</title>
    <style>
        :root {
            --atacadao-orange: #F37021;
            --atacadao-green: #00b300;
            --atacadao-blue: #3498db;
            --atacadao-red: #ff4d4d;
            --bg-color: #0a0a0a;
            --text-color: #e0e0e0;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
            --input-border: #3a3a3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh; 
            padding: 10px;
            -webkit-font-smoothing: antialiased;
        }

        .card { 
            background-color: var(--card-bg); 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 500px; 
            border-top: 6px solid var(--atacadao-orange); 
            margin-bottom: 30px;
            overflow: hidden;
        }

        .header { padding: 20px 15px; text-align: center; background: rgba(0,0,0,0.2); border-bottom: 1px solid #2a2a2a; }
        .header h1 { font-size: 18px; color: var(--atacadao-orange); text-transform: uppercase; letter-spacing: 1.5px; margin: 0;}
        
        .content { padding: 20px; }
        
        .row { display: flex; gap: 12px; margin-bottom: 16px; width: 100%; }
        
        @media (max-width: 360px) {
            .row-ajuste { flex-direction: column; }
        }

        .input-group { flex: 1; min-width: 0; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #b0b0b0; }
        
        .input-group input, .input-group select { 
            width: 100%; 
            padding: 0 14px; 
            height: 50px; 
            background: var(--input-bg); 
            border: 1px solid var(--input-border); 
            border-radius: 10px; 
            color: white; 
            font-size: 16px; 
            color-scheme: dark; 
            outline: none;
        }
        
        .input-group input:focus, .input-group select:focus { border-color: var(--atacadao-orange); }
        .input-group input:disabled { opacity: 0.4; background-color: #1a1a1a; cursor: not-allowed; }

        .toggle-container { 
            display: flex; 
            align-items: center; 
            margin-bottom: 16px; 
            background: #242426; 
            padding: 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            border: 1px solid #333; 
            user-select: none;
        }
        
        .toggle-container input { margin-right: 12px; width: 20px; height: 20px; accent-color: var(--atacadao-orange); }
        .toggle-container label { cursor: pointer; font-size: 15px; color: white; font-weight: 600; flex: 1;}

        button { 
            width: 100%; 
            background: var(--atacadao-green); 
            color: white; 
            border: none; 
            height: 56px; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 18px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(0, 179, 0, 0.3);
        }

        .results { margin-top: 25px; padding-top: 5px;}
        .scenario-box { background: #261f1a; border: 1px solid #4a2e1b; padding: 20px; border-radius: 12px; margin-bottom: 16px; }
        .scenario-box.alt { background: #1a2426; border-color: #1b3a4a; }
        .scenario-title { font-size: 15px; font-weight: 800; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--atacadao-orange); }
        
        .result-item { margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
        .result-item .label { font-size: 13px; color: #a0a0a0; }
        .result-item .value { font-size: 16px; font-weight: bold; color: #fff; }
        
        .highlight-saida { margin-top: 16px; padding-top: 16px; border-top: 1px dashed rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; }
        .highlight-saida .label { font-size: 14px; color: #fff; font-weight: bold;}
        .highlight-saida .value { font-size: 28px; font-weight: 900; color: var(--atacadao-green); }

        .alert-box { background: rgba(255, 77, 77, 0.15); border: 1px solid var(--atacadao-red); color: #ff6b6b; padding: 14px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; text-align: center; font-weight: bold; }
        .badge-bonus { background: rgba(243, 112, 33, 0.1); color: var(--atacadao-orange); padding: 8px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 10px; display: block; border: 1px solid rgba(243, 112, 33, 0.3); text-align: center; }
    </style>
</head>
<body onload="checkEscala()">
    <div class="card">
        <div class="header"><h1>Calculadora de Horas</h1></div>
        <div class="content">
            <form id="calcForm">
                <div class="input-group" style="margin-bottom: 16px;">
                    <label>Selecione sua Escala:</label>
                    <select id="escala" onchange="checkEscala()">
                        <option value="normal">Normal (7h20min)</option>
                        <option value="deposito">Depósito/Apoio (8h)</option>
                        <option value="deposito_sabado">Depósito/Apoio (SÁBADO/4H)</option>
                        <option value="adm">RH/Almox/Adm (8h48min)</option>
                    </select>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>Entrada Original:</label>
                        <input type="time" id="entrada" required>
                    </div>
                    <div class="input-group">
                        <label id="label-intervalo">Intervalo:</label>
                        <input type="time" id="intervalo" value="01:00" required>
                    </div>
                </div>

                <div class="toggle-container" onclick="document.getElementById('usar_ajuste').click();">
                    <input type="checkbox" id="usar_ajuste" onchange="toggleBanco()">
                    <label>Ajustar Banco de Horas</label>
                </div>

                <div id="box-banco-horas" style="display: none; padding: 15px; border-radius: 10px; background-color: rgba(243, 112, 33, 0.05); border: 1px solid rgba(243, 112, 33, 0.2); margin-bottom: 16px;">
                    <div class="row row-ajuste" style="margin-bottom: 0;">
                        <div class="input-group">
                            <label>O que vai fazer?</label>
                            <select id="tipo_ajuste">
                                <option value="devendo">Pagar Horas (+)</option>
                                <option value="pagar">Sair Mais Cedo (-)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Tempo (Ex: 01:00)</label>
                            <input type="time" id="tempo_ajuste" value="00:00">
                        </div>
                    </div>
                </div>

                <button type="submit">Calcular</button>
            </form>

            <div id="resultados" class="results" style="display: none;"></div>
        </div>
    </div>

    <script>
        const escalas = {
            'normal': { horas: 7, minutos: 20 },
            'deposito': { horas: 8, minutos: 0 },
            'deposito_sabado': { horas: 4, minutos: 0 },
            'adm': { horas: 8, minutos: 48 }
        };

        function checkEscala() {
            const escala = document.getElementById('escala').value;
            const campoIntervalo = document.getElementById('intervalo');
            const labelIntervalo = document.getElementById('label-intervalo');
            if (escala === 'deposito_sabado') {
                campoIntervalo.value = "00:00";
                campoIntervalo.disabled = true;
                labelIntervalo.style.color = "#555";
            } else {
                campoIntervalo.disabled = false;
                labelIntervalo.style.color = "#b0b0b0";
                if(campoIntervalo.value === "00:00") campoIntervalo.value = "01:00";
            }
        }

        function toggleBanco() {
            var box = document.getElementById('box-banco-horas');
            setTimeout(() => {
                box.style.display = document.getElementById('usar_ajuste').checked ? 'block' : 'none';
            }, 10);
        }

        function timeToMinutes(timeStr) {
            if(!timeStr) return 0;
            const [h, m] = timeStr.split(':').map(Number);
            return (h * 60) + m;
        }

        function addMinutes(dateObj, minutes) {
            return new Date(dateObj.getTime() + minutes * 60000);
        }

        function formatar(data, referenciaOriginal) {
            const h = String(data.getHours()).padStart(2, '0');
            const m = String(data.getMinutes()).padStart(2, '0');
            let texto = `${h}:${m}`;
            if (data.getDate() !== referenciaOriginal.getDate()) {
                texto += " <span style='font-size:11px; color:#aaa; font-weight:normal;'>(Amanhã)</span>";
            }
            return texto;
        }

        function calcularCenario(entradaStr, minutosTrabalhoBase, minutosIntervalo, minutosAjuste, tipoAjuste, ondeAplicar) {
            const [h, m] = entradaStr.split(':').map(Number);
            const entradaOriginal = new Date(2000, 0, 1, h, m, 0);
            let entradaReal = new Date(entradaOriginal.getTime());
            let saldoMinutosReal = minutosTrabalhoBase;

            let ajusteParaCalculo = 0;
            if (minutosAjuste > 0) {
                ajusteParaCalculo = (tipoAjuste === 'devendo') ? minutosAjuste : -minutosAjuste;
            }

            if (ondeAplicar === 'inicio' && ajusteParaCalculo !== 0) {
                entradaReal = addMinutes(entradaReal, -ajusteParaCalculo);
                saldoMinutosReal = minutosTrabalhoBase + ajusteParaCalculo;
            } else if (ondeAplicar === 'fim' && ajusteParaCalculo !== 0) {
                saldoMinutosReal = minutosTrabalhoBase + ajusteParaCalculo;
            }

            const limite5h35 = addMinutes(entradaReal, (5 * 60) + 35);
            let saidaBruta = addMinutes(entradaReal, saldoMinutosReal + minutosIntervalo);

            // LOGICA NOTURNA AJUSTADA:
            // Conta a partir das 22h, mas só aplica desconto se ultrapassar 23h
            let minutosApos22h = 0;
            let ultrapassou23h = false;
            let checarHora = new Date(entradaReal.getTime());
            
            while (checarHora < saidaBruta) {
                let horaH = checarHora.getHours();
                // Acumula minutos no período noturno padrão (22h às 05h)
                if (horaH >= 22 || horaH < 5) {
                    minutosApos22h++;
                }
                // Gatilho: Se em algum momento estiver trabalhando às 23h (ou depois até as 5h)
                if (horaH >= 23 || (horaH >= 0 && horaH < 5)) {
                    ultrapassou23h = true;
                }
                checarHora = addMinutes(checarHora, 1);
            }

            let bonusTotal = 0;
            if (ultrapassou23h) {
                let bonusPorBloco = Math.floor(minutosApos22h / 15) * 2;
                let bonusExtraTeto = (minutosApos22h > 120) ? -2 : 0;
                bonusTotal = bonusPorBloco + bonusExtraTeto;
            }

            let saidaFinal = addMinutes(saidaBruta, -bonusTotal);
            let proximoTurno = addMinutes(saidaFinal, 11 * 60);

            return {
                entrada: formatar(entradaReal, entradaOriginal),
                limite_regra: formatar(limite5h35, entradaOriginal),
                saida: formatar(saidaFinal, entradaOriginal),
                proximo: formatar(proximoTurno, entradaOriginal),
                bonus: bonusTotal,
                alerta_critico: (saldoMinutosReal > 335 && minutosIntervalo === 0)
            };
        }

        function renderScenario(titulo, dados, classeExtra = '') {
            let html = `<div class='scenario-box ${classeExtra}'>
                            <div class='scenario-title'>${titulo}</div>
                            <div class='result-item'><span class='label'>📥 Entrada Ponto:</span><span class='value'>${dados.entrada}</span></div>
                            <div class='result-item'><span class='label'>🕒 Limite Intervalo:</span><span class='value' style='color: #ffcc00;'>${dados.limite_regra}</span></div>
                            <div class='result-item'><span class='label'>📅 Próximo Turno (11h):</span><span class='value' style='color: #bbb;'>${dados.proximo}</span></div>`;
            if (dados.alerta_critico) html += `<div class='alert-box'>🚨 CRÍTICO: Jornada > 5:35h sem intervalo!</div>`;
            html += `<div class='highlight-saida'><span class='label'>🚪 Bater Saída:</span><span class='value'>${dados.saida}</span></div>`;
            if (dados.bonus > 0) html += `<div class='badge-bonus'>🌙 BÔNUS (APÓS 23H): -${dados.bonus} MIN</div>`;
            html += `</div>`;
            return html;
        }

        document.getElementById('calcForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.activeElement.blur(); 
            const entrada = document.getElementById('entrada').value;
            const escalaSelecionada = document.getElementById('escala').value;
            const intervaloInput = document.getElementById('intervalo').value;
            const usarAjuste = document.getElementById('usar_ajuste').checked;
            const tipoAjuste = document.getElementById('tipo_ajuste').value;
            const tempoAjuste = document.getElementById('tempo_ajuste').value;

            let minutosIntervaloTotal = (escalaSelecionada !== 'deposito_sabado') ? timeToMinutes(intervaloInput) : 0;
            const saldoMinutosTrabalho = (escalas[escalaSelecionada].horas * 60) + escalas[escalaSelecionada].minutos;
            let minutosAjuste = (usarAjuste && tempoAjuste) ? timeToMinutes(tempoAjuste) : 0;

            let htmlResultados = "";
            if (tipoAjuste === 'devendo' && minutosAjuste > 120) {
                htmlResultados += `<div class="alert-box" style="border-color: #ffaa00; color: #ffaa00;">⚠️ ALERTA: Mais de 2h extras!</div>`;
            }

            if (usarAjuste && minutosAjuste > 0) {
                htmlResultados += renderScenario("Opção 1: Ajuste na Saída", calcularCenario(entrada, saldoMinutosTrabalho, minutosIntervaloTotal, minutosAjuste, tipoAjuste, 'fim'));
                htmlResultados += renderScenario("Opção 2: Ajuste na Entrada", calcularCenario(entrada, saldoMinutosTrabalho, minutosIntervaloTotal, minutosAjuste, tipoAjuste, 'inicio'), 'alt');
            } else {
                htmlResultados += renderScenario("Jornada Padrão", calcularCenario(entrada, saldoMinutosTrabalho, minutosIntervaloTotal, 0, '', 'fim'));
            }

            const divResultados = document.getElementById('resultados');
            divResultados.innerHTML = htmlResultados;
            divResultados.style.display = 'block';
            setTimeout(() => { divResultados.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
        });
    </script>
</body>
</html>
